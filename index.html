<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
height:500vh;
display:flex;
align-items:center;
justify-content:center;
overflow-x:hidden;

background:linear-gradient(140deg,#f8d7ff,#ffd7e8,#ffe5c7);
background-size:300% 300%;
animation:bgMove 18s ease infinite;
}

/* Background gradient animation */

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Glass panel */

.glass-box{

position:fixed;

width:90%;
max-width:900px;
height:70vh;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.28);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border-radius:28px;
border:1px solid rgba(255,255,255,0.45);

box-shadow:0 20px 40px rgba(0,0,0,0.12);

padding:40px;
text-align:center;

}

/* Message text */

.text{

font-size:30px;
color:#333;
line-height:1.6;

opacity:0;
transform:translateY(20px);
transition:all 0.8s ease;

}

.text.show{
opacity:1;
transform:translateY(0);
}

/* Flower style */

.flower{
font-size:40px;
margin:10px 0;
}

/* Floating petals */

.petal{
position:fixed;
font-size:20px;
opacity:0.6;
pointer-events:none;
animation:rise linear forwards;
z-index:-1;
}

@keyframes rise{
0%{
transform:translateY(100vh) rotate(0deg);
opacity:0;
}
10%{
opacity:0.7;
}
100%{
transform:translateY(-10vh) rotate(360deg);
opacity:0;
}
}

/* Mobile adjustment */

@media(max-width:600px){

.text{
font-size:24px;
}

.glass-box{
height:65vh;
padding:30px;
}

}

</style>
</head>

<body>

<div class="glass-box">

<div id="message" class="text show">

<div class="flower">🌸</div>
Happy Women's Day
<div class="flower">🌸</div>

</div>

</div>

<script>

/* Messages for scroll storytelling */

const messages=[

`<div class="flower">🌸</div>
Happy Women's Day
<div class="flower">🌸</div>`,

`Today we celebrate the strength
that shapes the world.`,

`The courage to rise
again and again.`,

`The kindness that makes
life brighter.`,

`To every incredible woman —
today is for you. 💐`

];

let current=0;

window.addEventListener("scroll",()=>{

const scroll=window.scrollY;
const height=document.body.scrollHeight-window.innerHeight;

const progress=scroll/height;

const index=Math.floor(progress*messages.length);

if(index!==current && index<messages.length){

current=index;

const box=document.getElementById("message");

box.classList.remove("show");

setTimeout(()=>{

box.innerHTML=messages[index];

box.classList.add("show");

},300);

}

});

/* Floating petals animation */

function createPetal(){

const petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(Math.random()*6+8)+"s";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},14000);

}

setInterval(createPetal,800);

</script>

</body>
</html>
