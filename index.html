<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day 🌸</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:linear-gradient(140deg,#ffd9ec,#f7c7ff,#ffe8c7);
background-size:300% 300%;
animation:bgMove 15s ease infinite;
overflow-x:hidden;
color:#333;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* PETAL LAYER */

#petal-layer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

.petal{
position:absolute;
font-size:24px;
opacity:0.85;
animation:float 10s linear forwards;
}

@keyframes float{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

/* SECTIONS */

section{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

/* GLASS CARD */

.card{
width:90%;
max-width:820px;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(16px);
border-radius:28px;
border:1px solid rgba(255,255,255,0.45);
box-shadow:0 25px 60px rgba(0,0,0,0.15);
padding:60px;
text-align:center;
opacity:0;
transform:translateY(50px);
transition:all 0.8s ease;
z-index:2;
}

/* REVEAL ANIMATION */

.card.show{
opacity:1;
transform:translateY(0);
}

/* TITLE */

.title{
display:flex;
align-items:center;
justify-content:center;
gap:18px;
font-size:36px;
font-weight:500;
}

.title span{
font-size:42px;
}

/* TEXT */

.text{
font-size:26px;
line-height:1.7;
}

/* FINAL GLOW */

.final{
animation:glow 2.5s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 20px 40px rgba(0,0,0,0.12);}
to{box-shadow:0 25px 70px rgba(255,120,200,0.4);}
}

/* WATER RIPPLE */

.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.45);
transform:scale(0);
animation:rippleAnim 0.8s ease-out;
pointer-events:none;
}

@keyframes rippleAnim{
to{
transform:scale(10);
opacity:0;
}
}

/* MOBILE */

@media(max-width:600px){

.title{font-size:28px}
.title span{font-size:32px}

.text{font-size:20px}

.card{padding:40px}

}

</style>
</head>

<body>

<div id="petal-layer"></div>

<section>
<div class="card">
<div class="title">
<span>🌸</span>
Happy Women's Day
<span>🌸</span>
</div>
</div>
</section>

<section>
<div class="card text">
Today we celebrate the strength that shapes the world.
</div>
</section>

<section>
<div class="card text">
The courage to rise again and again.
</div>
</section>

<section>
<div class="card text">
The kindness that makes life brighter.
</div>
</section>

<section>
<div class="card text final">
To every incredible woman — today is for you. 💐
</div>
</section>

<script>

/* SCROLL REVEAL */

const cards=document.querySelectorAll(".card");

function reveal(){

const trigger=window.innerHeight*0.85;

cards.forEach(card=>{

const top=card.getBoundingClientRect().top;

if(top<trigger){
card.classList.add("show");
}

});

}

window.addEventListener("scroll",reveal);
reveal();

/* PETALS */

function createPetal(){

const petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"%";
petal.style.animationDuration=(Math.random()*5+6)+"s";

document.getElementById("petal-layer").appendChild(petal);

setTimeout(()=>{
petal.remove();
},11000);

}

setInterval(createPetal,600);

/* RIPPLE EFFECT */

document.addEventListener("click",function(e){

const ripple=document.createElement("div");

ripple.className="ripple";

const size=80;

ripple.style.width=size+"px";
ripple.style.height=size+"px";

ripple.style.left=(e.clientX-size/2)+"px";
ripple.style.top=(e.clientY-size/2)+"px";

document.body.appendChild(ripple);

setTimeout(()=>{
ripple.remove();
},800);

});

</script>

</body>
</html>
