<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day 🌸</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
background-size:400% 400%;
animation:gradient 10s ease infinite;
overflow:hidden;
color:white;
text-align:center;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
z-index:10;
padding:20px;
max-width:600px;
width:90%;
}

h1{
font-size:clamp(32px,6vw,50px);
margin:0 0 15px 0;
line-height:1.2;
text-align:center;
}

p{
font-size:18px;
margin-bottom:20px;
}

button{
padding:12px 28px;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4b8b;
}

.message{
margin-top:25px;
font-size:20px;
display:none;
line-height:1.5;
}

.flower{
position:absolute;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
}
100%{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Happy Women's Day 🌸</h1>

<p>Celebrating strength, beauty and brilliance.</p>

<button onclick="showMessage()">Open Surprise 💌</button>

<div class="message" id="msg">
✨ To the incredible women who make the world brighter every day.<br><br>
Your strength, kindness, and courage inspire everyone around you.<br><br>
Never forget how powerful and extraordinary you truly are. 💐
</div>

</div>

<script>

function showMessage(){
document.getElementById("msg").style.display="block";
}

function createFlower(){

const flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(Math.random()*5+5)+"s";

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},10000);

}

setInterval(createFlower,400);

</script>

</body>
</html>
